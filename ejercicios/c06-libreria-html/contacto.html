      <h1 id="titulo" class="text-center">Contactate</h1>
      <div class="container mt-4">
        <form id="formContacto" novalidate>
      
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" required>
            <div class="invalid-feedback">El nombre es obligatorio.</div>
          </div>
      
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required>
            <div class="invalid-feedback">Ingresá un email válido.</div>
          </div>
      
          <div class="mb-3">
            <label for="asunto" class="form-label">Asunto</label>
            <select class="form-select" id="asunto" required>
              <option value="">Seleccioná una opción</option>
              <option value="consulta">Consulta</option>
              <option value="reclamo">Reclamo</option>
              <option value="sugerencia">Sugerencia</option>
            </select>
            <div class="invalid-feedback">Seleccioná un asunto.</div>
          </div>
      
          <div class="mb-3">
            <label for="mensaje" class="form-label">Mensaje</label>
            <textarea class="form-control" id="mensaje" rows="4" required></textarea>
            <div class="invalid-feedback">El mensaje es obligatorio.</div>
          </div>
      
          <button type="submit" class="btn btn-outline-danger">Enviar</button>
      
        </form>
      </div>
